services:
  api1:
    build: ./app
    environment:
      VIRTUAL_THREADS: ${API1_VT:-false}
      API2_URL: http://api2:8080
      SERVER_TOMCAT_THREADS_MAX: ${SERVER_TOMCAT_THREADS_MAX:-200}
    ports:
      - "8081:8080"
    depends_on:
      - api2

  api2:
    build: ./app
    environment:
      VIRTUAL_THREADS: ${API2_VT:-false}
      API2_DELAY_MS: ${API2_DELAY_MS:-200}
      SERVER_TOMCAT_THREADS_MAX: ${SERVER_TOMCAT_THREADS_MAX:-200}
    ports:
      - "8082:8080"

  k6:
    image: grafana/k6:latest
    environment:
      QUICK: ${QUICK:-false}
    volumes:
      - ./k6:/scripts
      - ./results:/results
    command: ["run", "/scripts/script.js"]
    depends_on:
      - api1
